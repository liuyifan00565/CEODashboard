# 更新时间: 2026-07-07 14:40:00 CST
# 更新内容: 新增本地前端+后端联调 Docker 编排：db(mysql:8.4 自动导入 ceo_dashboard 完整数据) + cockpit(Vite dev 同时提供前端 HMR 与 /api 后端接口)，DB_HOST 重定向到 db 服务覆盖 .env.local 的 127.0.0.1。
#
# 用法：
#   1. 启动 Docker Desktop
#   2. docker compose up -d --build
#   3. 浏览器打开 http://127.0.0.1:5173 ，curl http://127.0.0.1:5173/api/dashboard-data 验证真实数据
#   4. docker compose down 停服务（db_data 卷保留，下次 up 数据仍在）
#
# 面向本地开发联调；生产交付仍走 scripts/package_aliyun_amd64.sh。

services:
  db:
    image: mysql:8.4
    container_name: ceodashboard-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ceodashboard
      MYSQL_DATABASE: ceo_dashboard
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # 首次启动空卷时自动导入完整库（含表结构 + 真实数据）
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  cockpit:
    build: ./cockpit
    container_name: ceodashboard-cockpit
    restart: unless-stopped
    # 复用已有 .env.local（含 DASHSCOPE_* 通义密钥）；下面的 environment 会覆盖其中的 DB_* 指向容器内 db
    env_file:
      - ./cockpit/.env.local
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ceodashboard
      DB_NAME: ceo_dashboard
      PORT: 5173
    ports:
      - "5173:5173"
    volumes:
      # 整个 cockpit 目录挂入，支持前端/后端源码热更新
      - ./cockpit:/app
      # 匿名卷保留容器内 npm ci 装好的 node_modules，避免被宿主 Windows node_modules 覆盖
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
